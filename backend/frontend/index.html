<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥑 키토 식단 추천 시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
            font-size: 1.1em;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: white;
            color: #4a5568;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .nav-btn.active {
            background: #667eea;
            color: white;
        }

        .content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            min-height: 400px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #718096;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #e53e3e;
        }

        .success {
            background: #c6f6d5;
            color: #22543d;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #38a169;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #e2e8f0;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #718096;
            font-size: 0.9em;
        }

        .restaurant-list, .menu-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .restaurant-card, .menu-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            transition: transform 0.2s ease;
        }

        .restaurant-card:hover, .menu-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .restaurant-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .menu-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .keto-score {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin: 5px 0;
        }

        .keto-high { background: #c6f6d5; color: #22543d; }
        .keto-medium { background: #bee3f8; color: #2b6cb0; }
        .keto-low { background: #fed7d7; color: #c53030; }

        .menu-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .type-main { background: #bee3f8; color: #2b6cb0; }
        .type-side { background: #e9d8fd; color: #553c9a; }

        .form-group {
            margin: 20px 0;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }

        .meal-plan {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .meal-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .meal-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 15px;
        }

        .meal-details {
            color: #718096;
            line-height: 1.6;
        }

        .ingredients {
            margin: 10px 0;
        }

        .ingredients-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 5px;
        }

        .ingredient-tag {
            background: #e2e8f0;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8em;
        }

        .nutrition {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .nutrition-item {
            text-align: center;
        }

        .nutrition-value {
            font-weight: bold;
            color: #667eea;
        }

        .nutrition-label {
            font-size: 0.8em;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥑 키토 식단 추천 시스템</h1>
            <p>GPT 기반 맞춤형 키토 다이어트 식단 추천 서비스</p>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn active" id="home-btn" onclick="showHome()">🏠 홈</button>
            <button class="nav-btn" id="restaurants-btn" onclick="showRestaurants()">🏪 식당 목록</button>
            <button class="nav-btn" id="menus-btn" onclick="showMenus()">🍽️ 메뉴 조회</button>
            <button class="nav-btn" id="recommend-btn" onclick="showRecommendation()">🤖 식단 추천</button>
        </div>

        <div class="content" id="content">
            <!-- 콘텐츠가 여기에 동적으로 로드됩니다 -->
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentView = 'home';

        // 페이지 로드 시 홈 화면 표시
        window.onload = function() {
            showHome();
        };

        // 활성 버튼 업데이트
        function updateActiveButton(activeId) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(activeId).classList.add('active');
        }

        // 로딩 화면 표시
        function showLoading() {
            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>데이터를 불러오는 중...</p>
                </div>
            `;
        }

        // 에러 화면 표시
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    <h3>❌ 오류 발생</h3>
                    <p>${message}</p>
                    <p><strong>해결 방법:</strong></p>
                    <ul>
                        <li>백엔드 서버가 실행 중인지 확인하세요 (http://localhost:8000)</li>
                        <li>터미널에서: <code>python -m uvicorn app.main:app --reload --port 8000</code></li>
                        <li>OpenAI API 키가 설정되어 있는지 확인하세요</li>
                    </ul>
                </div>
            `;
        }

        // 홈 화면 표시
        async function showHome() {
            updateActiveButton('home-btn');
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/stats`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const stats = await response.json();
                
                document.getElementById('content').innerHTML = `
                    <h2>📊 시스템 현황</h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">${stats.total_restaurants}</div>
                            <div class="stat-label">등록된 식당</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${stats.total_menus}</div>
                            <div class="stat-label">전체 메뉴</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${stats.high_keto_menus}</div>
                            <div class="stat-label">키토 친화 메뉴 (70점 이상)</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${stats.average_keto_score ? stats.average_keto_score.toFixed(1) : '0.0'}</div>
                            <div class="stat-label">평균 키토 점수</div>
                        </div>
                    </div>
                    
                    <div class="success">
                        <h3>🎉 키토 식단 추천 시스템에 오신 것을 환영합니다!</h3>
                        <p>이 시스템은 GPT를 활용하여 개인 맞춤형 키토 다이어트 식단을 추천해드립니다.</p>
                        <ul style="margin-top: 15px; padding-left: 20px;">
                            <li><strong>식당 목록:</strong> 키토 친화적인 메뉴를 제공하는 식당들을 확인하세요</li>
                            <li><strong>메뉴 조회:</strong> 각 메뉴의 키토 점수와 상세 정보를 살펴보세요</li>
                            <li><strong>식단 추천:</strong> 개인 선호도에 맞는 키토 식단을 AI가 추천해드립니다</li>
                        </ul>
                    </div>
                `;
            } catch (error) {
                showError(error.message);
            }
        }

        // 식당 목록 표시
        async function showRestaurants() {
            updateActiveButton('restaurants-btn');
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/restaurants`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const restaurants = await response.json();
                
                let html = '<h2>🏪 식당 목록</h2>';
                
                if (restaurants.length === 0) {
                    html += '<p>등록된 식당이 없습니다.</p>';
                } else {
                    html += '<div class="restaurant-list">';
                    restaurants.forEach(restaurant => {
                    html += `
                            <div class="restaurant-card" onclick="showRestaurantMenus(${restaurant.id})">
                                <div class="restaurant-name">${restaurant.name}</div>
                                ${restaurant.link ? `<p><a href="${restaurant.link}" target="_blank">🔗 식당 정보</a></p>` : ''}
                                <p style="color: #718096; margin-top: 10px;">클릭하여 메뉴 보기</p>
                        </div>
                    `;
                });
                    html += '</div>';
                }
                
                document.getElementById('content').innerHTML = html;
            } catch (error) {
                showError(error.message);
            }
        }

        // 특정 식당의 메뉴 표시
        async function showRestaurantMenus(restaurantId) {
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/restaurants/${restaurantId}/menus`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                
                let html = `<h2>🍽️ 메뉴 목록</h2>`;
                html += `<p>총 ${data.total_filtered}개의 메뉴가 있습니다.</p>`;
                
                if (data.menus.length === 0) {
                    html += '<p>메뉴가 없습니다.</p>';
                } else {
                    html += '<div class="menu-list">';
                data.menus.forEach(menu => {
                        const ketoClass = menu.keto_score >= 70 ? 'keto-high' : 
                                        menu.keto_score >= 40 ? 'keto-medium' : 'keto-low';
                        const typeClass = menu.is_main ? 'type-main' : 'type-side';
                        const typeText = menu.is_main ? '메인' : '사이드';
                    
                    html += `
                            <div class="menu-card">
                            <div class="menu-name">${menu.name}</div>
                                <div class="keto-score ${ketoClass}">키토 점수: ${menu.keto_score}점</div>
                                <span class="menu-type ${typeClass}">${typeText}</span>
                        </div>
                    `;
                });
                html += '</div>';
                }
                
                document.getElementById('content').innerHTML = html;
            } catch (error) {
                showError(error.message);
            }
        }

        // 전체 메뉴 표시
        async function showMenus() {
            updateActiveButton('menus-btn');
            showLoading();
            
            try {
                // 첫 번째 식당의 메뉴를 예시로 표시
                const restaurantsResponse = await fetch(`${API_BASE}/restaurants`);
                if (!restaurantsResponse.ok) throw new Error(`HTTP ${restaurantsResponse.status}`);
                
                const restaurants = await restaurantsResponse.json();
                if (restaurants.length === 0) {
                    throw new Error('등록된 식당이 없습니다.');
                }
                
                // 모든 식당의 메뉴를 표시하는 기능 구현
                let html = '<h2>🍽️ 전체 메뉴</h2>';
                html += `
                    <div class="form-group">
                        <label class="form-label">키토 점수 필터</label>
                        <select class="form-input" id="ketoFilter" onchange="filterMenus()">
                            <option value="60" selected>키토 추천 메뉴 (60점 이상)</option>
                            <option value="70">키토 친화적 (70점 이상)</option>
                            <option value="40">보통 (40점 이상)</option>
                            <option value="0">전체 메뉴</option>
                            </select>
                    </div>
                    <div id="menuResults"></div>
                `;
                
                document.getElementById('content').innerHTML = html;
                
                // 기본으로 60점 이상 메뉴 표시
                filterMenus();
                
            } catch (error) {
                showError(error.message);
            }
        }

        // 메뉴 필터링
        async function filterMenus() {
            const minScore = document.getElementById('ketoFilter').value;
            const menuResults = document.getElementById('menuResults');
            
            menuResults.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>필터링된 메뉴를 불러오는 중...</p>
                </div>
            `;
            
            try {
                // 모든 식당의 메뉴를 가져와서 필터링
                const restaurantsResponse = await fetch(`${API_BASE}/restaurants`);
                if (!restaurantsResponse.ok) throw new Error(`HTTP ${restaurantsResponse.status}`);
                
                const restaurants = await restaurantsResponse.json();
                let allMenus = [];
                
                // 각 식당의 메뉴를 가져오기
                for (const restaurant of restaurants) {
                    try {
                        const menuResponse = await fetch(`${API_BASE}/restaurants/${restaurant.id}/menus?min_keto_score=${minScore}&limit=1000`);
                        if (menuResponse.ok) {
                            const menuData = await menuResponse.json();
                            menuData.menus.forEach(menu => {
                                allMenus.push({
                                    ...menu,
                                    restaurant_name: restaurant.name
                                });
                            });
                        }
                    } catch (error) {
                        console.log(`식당 ${restaurant.name} 메뉴 로딩 실패:`, error);
                    }
                }
                
                // 키토 점수 순으로 정렬
                allMenus.sort((a, b) => b.keto_score - a.keto_score);
                
                let html = `<h3>📋 필터링 결과 (${allMenus.length}개 메뉴)</h3>`;
                
                if (allMenus.length === 0) {
                    html += '<p>조건에 맞는 메뉴가 없습니다.</p>';
                } else {
                    html += '<div class="menu-list">';
                    allMenus.forEach(menu => {
                        const ketoClass = menu.keto_score >= 70 ? 'keto-high' : 
                                        menu.keto_score >= 60 ? 'keto-medium' : 'keto-low';
                        const typeClass = menu.is_main ? 'type-main' : 'type-side';
                        const typeText = menu.is_main ? '메인' : '사이드';
                    
                        html += `
                            <div class="menu-card">
                                <div class="menu-name">${menu.name}</div>
                                <div style="color: #718096; font-size: 0.9em; margin-bottom: 8px;">📍 ${menu.restaurant_name}</div>
                                <div class="keto-score ${ketoClass}">키토 점수: ${menu.keto_score}점</div>
                                <span class="menu-type ${typeClass}">${typeText}</span>
                            </div>
                        `;
                    });
                    html += '</div>';
                }
                
                menuResults.innerHTML = html;
                
            } catch (error) {
                menuResults.innerHTML = `
                    <div class="error">
                        <h3>❌ 메뉴 로딩 실패</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // 식단 추천 화면 표시
        async function showRecommendation() {
            updateActiveButton('recommend-btn');
            
            document.getElementById('content').innerHTML = `
                <h2>🤖 개인 맞춤 키토 식단 추천</h2>
                
                <div class="form-group">
                    <label class="form-label">선호하는 음식 (쉼표로 구분)</label>
                    <input type="text" class="form-input" id="preferredFoods" 
                           placeholder="예: 계란, 아보카도, 연어, 치킨">
                </div>
                
                <div class="form-group">
                    <label class="form-label">싫어하는 음식 (쉼표로 구분)</label>
                    <input type="text" class="form-input" id="dislikedFoods" 
                           placeholder="예: 브로콜리, 양파">
                </div>
                
                <div class="form-group">
                    <label class="form-label">알레르기 음식 (쉼표로 구분)</label>
                    <input type="text" class="form-input" id="allergies" 
                           placeholder="예: 견과류, 해산물">
                </div>
                
                <button class="btn btn-primary" onclick="getMealRecommendation()">
                    🎯 맞춤 식단 추천받기
                </button>
                
                <div id="recommendationResult"></div>
            `;
        }

        // 식단 추천 요청
        async function getMealRecommendation() {
            const preferredFoods = document.getElementById('preferredFoods').value
                .split(',').map(s => s.trim()).filter(s => s);
            const dislikedFoods = document.getElementById('dislikedFoods').value
                .split(',').map(s => s.trim()).filter(s => s);
            const allergies = document.getElementById('allergies').value
                .split(',').map(s => s.trim()).filter(s => s);

            if (preferredFoods.length === 0 && dislikedFoods.length === 0 && allergies.length === 0) {
                alert('선호 음식, 비선호 음식, 알레르기 중 최소 하나는 입력해주세요.');
                return;
            }

            document.getElementById('recommendationResult').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>AI가 맞춤 식단을 생성하고 있습니다...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`${API_BASE}/recommend-meal`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        preferred_foods: preferredFoods,
                        disliked_foods: dislikedFoods,
                        allergies: allergies
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                // 식단 추천 결과 표시
                let html = `
                    <div class="success">
                        <h3>✅ 맞춤 식단이 완성되었습니다!</h3>
                        <p><strong>입력하신 정보:</strong></p>
                        <ul>
                            ${preferredFoods.length > 0 ? `<li><strong>선호:</strong> ${preferredFoods.join(', ')}</li>` : ''}
                            ${dislikedFoods.length > 0 ? `<li><strong>비선호:</strong> ${dislikedFoods.join(', ')}</li>` : ''}
                            ${allergies.length > 0 ? `<li><strong>알레르기:</strong> ${allergies.join(', ')}</li>` : ''}
                        </ul>
                    </div>
                    
                    <div class="meal-plan">
                `;

                // 아침, 점심, 저녁 식사 표시
                const meals = [
                    { key: 'breakfast', title: '🌅 아침식사', icon: '🥚' },
                    { key: 'lunch', title: '🍽️ 점심식사', icon: '🥗' },
                    { key: 'dinner', title: '🌙 저녁식사', icon: '🥩' }
                ];

                meals.forEach(meal => {
                    const mealData = data.meal_plan[meal.key];
                    if (mealData) {
                        html += `
                            <div class="meal-card">
                                <div class="meal-title">${meal.title}</div>
                                <h4>${meal.icon} ${mealData.name}</h4>
                                
                                <div class="ingredients">
                                    <strong>재료:</strong>
                                    <div class="ingredients-list">
                                        ${mealData.ingredients ? mealData.ingredients.map(ingredient => 
                                            `<span class="ingredient-tag">${ingredient}</span>`
                                        ).join('') : ''}
                                    </div>
                                </div>
                                
                                <div class="meal-details">
                                    <strong>조리법:</strong><br>
                                    ${mealData.cooking_method || '조리법 정보 없음'}
                                </div>
                                
                                <div class="nutrition">
                                    <div class="nutrition-item">
                                        <div class="nutrition-value">${mealData.carbs || 'N/A'}</div>
                                        <div class="nutrition-label">탄수화물</div>
                                    </div>
                                    <div class="nutrition-item">
                                        <div class="nutrition-value">${mealData.fat || 'N/A'}</div>
                                        <div class="nutrition-label">지방</div>
                                    </div>
                                    <div class="nutrition-item">
                                        <div class="nutrition-value">${mealData.protein || 'N/A'}</div>
                                        <div class="nutrition-label">단백질</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
                
                html += '</div>';
                
                document.getElementById('recommendationResult').innerHTML = html;

            } catch (error) {
                document.getElementById('recommendationResult').innerHTML = `
                    <div class="error">
                        <h3>❌ 식단 추천 실패</h3>
                        <p>${error.message}</p>
                        <p>OpenAI API 키가 설정되지 않았거나 서비스 오류일 수 있습니다.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
